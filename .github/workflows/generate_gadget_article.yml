name: Generate Gadget Article

on:
  schedule:
    - cron: '0 23 * * *'  # JST 8:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Tokyo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate gadget article
        run: python generate_gadget_article.py

      - name: Debug — articles ディレクトリの内容
        run: |
          echo "=== ls articles/ ==="
          ls -lh articles/
          echo "=== git status ==="
          git status

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/
          echo "=== git status after add ==="
          git status
          if git diff --cached --quiet; then
            echo "変更なし: commit をスキップします"
          else
            git commit -m "chore: add gadget article $(date +'%Y-%m-%d')"
            git push
            echo "=== commit / push 完了 ==="
            git log --oneline -3
          fi
