name: Generate Note Article

on:
  schedule:
    - cron: '0 22 * * *'  # JST 7:00（メール送信の2時間前）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Tokyo  # date コマンドも JST で動かす

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate article
        run: python generate_note_article.py

      - name: Send email
        run: python main.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Debug — articles ディレクトリの内容
        run: |
          echo "=== ls articles/ ==="
          ls -lh articles/
          echo "=== git status ==="
          git status

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/
          echo "=== git status after add ==="
          git status
          if git diff --cached --quiet; then
            echo "変更なし: commit をスキップします"
          else
            git commit -m "chore: add note article $(date +'%Y-%m-%d')"
            git push
            echo "=== commit / push 完了 ==="
            git log --oneline -3
          fi
