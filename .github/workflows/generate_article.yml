name: Generate Note Article

on:
  schedule:
    - cron: '0 22 * * *'  # JST 7:00（メール送信の2時間前）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate article
        run: python generate_note_article.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/
          git diff --cached --quiet || git commit -m "chore: add note article $(date -u +'%Y-%m-%d')"
          git push
